<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="box-green">Green</div>
    <div class="box-red">Red</div>
    <div class="box-blue">Blue</div>
    <div class="box-yellow">Yellow</div>
<style>
    
    .box-green{
        width: 150px;
        height: 150px;
        background-color: green;
        position: absolute;
        top: 50px;
        left: 50px;
        z-index: 1;
    }
    .box-red{ 
        width: 150px;
        height: 150px;
        background-color: red;
        position: absolute;
        top: 100px;
        left: 300px;
        z-index: 4;
    }
    .box-blue{ 
       
        width: 150px;
        height: 150px;
        background-color: blue;
        position: absolute;
        top: 50px;
        left: 250px;
        z-index: 3;


        
        
    }
    .box-yellow{
        width: 150px;
        height: 150px;
        background-color: yellow;
        position: absolute;
        top: 100px;
        left: 100px;
        z-index: 2; 
    }
    
    

</style>
    
</body>

</html>
