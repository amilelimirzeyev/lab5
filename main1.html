<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapşırıq 3 - Box Model</title>
    <style>
       
        body {
            font-family: Arial, sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        
        .task-container {
            background-color: white;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

       
        .margin-box {
            border: 1px dashed #333;
            background-color: white;
            padding: 10px 20px 20px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            color: black;
        }

        
        .border-box {
            background-color: #00b050; 
            padding: 10px 20px 20px 20px;
            margin-top: 10px;
        }

       
        .padding-box {
            background-color: #e6e6e6; 
            padding: 10px 20px 20px 20px;
            margin-top: 10px;
        }

       
        .content-box {
            background-color: #f5f5f5;
            border: 1px dashed #666;
            padding: 30px;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="task-container">
        <div class="margin-box">
            Margin
            <div class="border-box">
                Border
                <div class="padding-box">
                    Padding
                    <div class="content-box">
                        Content
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
